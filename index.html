<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alan's Timers!</title>
<style>
/* ── Reset ─────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Theme Variables ────────────────────────────────────────── */
body.mario {
  --bg-from:     #1a0a2e;
  --bg-to:       #3d1a78;
  --accent:      #ffd200;
  --accent-glow: rgba(255,210,0,0.5);
  --card-from:   #e52d27;
  --card-to:     #b31217;
  --card-border: #ffd200;
  --card-sub:    #ffeb80;
  --btn-bg:      #ffd200;
  --btn-txt:     #333;
  --btn-hover:   #ffe44d;
  --wheel-bg:    #120820;
  --wheel-bdr:   #3a1a5a;
  --modal-bg:    #1e0a3a;
  --modal-bdr:   #ffd200;
  --go-from:     #11998e;
  --go-to:       #38ef7d;
  --go-txt:      #fff;
}

body.roomba {
  --bg-from:     #0a1628;
  --bg-to:       #0d2137;
  --accent:      #69f0ae;
  --accent-glow: rgba(105,240,174,0.4);
  --card-from:   #37474f;
  --card-to:     #263238;
  --card-border: #69f0ae;
  --card-sub:    #69f0ae;
  --btn-bg:      #69f0ae;
  --btn-txt:     #1a3025;
  --btn-hover:   #9effc8;
  --wheel-bg:    #0a1520;
  --wheel-bdr:   #1a3040;
  --modal-bg:    #0d1f2e;
  --modal-bdr:   #69f0ae;
  --go-from:     #00b09b;
  --go-to:       #69f0ae;
  --go-txt:      #0a2018;
}

/* ── Page Layout ────────────────────────────────────────────── */
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
  padding: 20px 20px 50px;
  transition: background 0.6s ease;
}

/* ── Header ─────────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

h1 {
  color: #fff;
  font-size: 1.8rem;
  letter-spacing: 2px;
  text-shadow: 0 0 20px var(--accent-glow);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: text-shadow 0.4s;
}

/* ── Theme Toggle ───────────────────────────────────────────── */
.theme-toggle {
  display: flex;
  background: rgba(255,255,255,0.1);
  border-radius: 50px;
  padding: 5px;
  gap: 2px;
}

.theme-opt {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: bold;
  background: transparent;
  color: rgba(255,255,255,0.5);
  transition: background 0.25s, color 0.25s;
  white-space: nowrap;
}

.theme-opt.active {
  background: var(--accent);
  color: var(--btn-txt);
}

/* ── Add Button ─────────────────────────────────────────────── */
#add-btn {
  display: block;
  margin: 0 auto 28px;
  padding: 16px 48px;
  font-size: 1.4rem;
  font-weight: bold;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  background: linear-gradient(135deg, var(--btn-hover), var(--accent));
  color: var(--btn-txt);
  box-shadow: 0 4px 20px var(--accent-glow);
  transition: transform 0.1s, box-shadow 0.2s;
}
#add-btn:hover  { transform: scale(1.04); box-shadow: 0 6px 28px var(--accent-glow); }
#add-btn:active { transform: scale(0.97); }

/* ── Timers Grid ────────────────────────────────────────────── */
#timers-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  justify-content: center;
}

/* ── Overlay ────────────────────────────────────────────────── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.78);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.overlay.open { display: flex; }

/* ── Modal Box ──────────────────────────────────────────────── */
.modal-box {
  background: var(--modal-bg);
  border: 2px solid var(--modal-bdr);
  border-radius: 24px;
  padding: 28px 24px;
  width: 360px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  color: #fff;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  transition: background 0.4s, border-color 0.4s;
}

.modal-box h2 {
  text-align: center;
  font-size: 1.4rem;
  margin-bottom: 22px;
}

.modal-section { margin-bottom: 22px; }

.modal-section > label {
  display: block;
  margin-bottom: 10px;
  font-size: 0.8rem;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--accent);
  opacity: 0.8;
}

/* ── Activity Grid ──────────────────────────────────────────── */
.activity-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.act-btn {
  padding: 11px 8px;
  border: 2px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: bold;
  background: rgba(255,255,255,0.06);
  color: #fff;
  text-align: center;
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
}
.act-btn:hover { background: rgba(255,255,255,0.13); }
.act-btn.selected {
  border-color: var(--accent);
  background: rgba(255,255,255,0.12);
  box-shadow: 0 0 14px var(--accent-glow);
}

/* ── Wheel Picker ───────────────────────────────────────────── */
.wheel-btn {
  display: block;
  width: 100%;
  background: var(--btn-bg);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 1.1rem;
  padding: 6px 0;
  cursor: pointer;
  opacity: 0.85;
  transition: opacity .15s, transform .1s;
}
.wheel-btn:hover  { opacity: 1; }
.wheel-btn:active { transform: scale(0.93); }

.wheel-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.wheel-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.wheel-lbl {
  font-size: 0.72rem;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  opacity: 0.7;
}

.wheel-sep {
  font-size: 2.4rem;
  font-weight: 900;
  color: #fff;
  margin-top: 22px;
}

.wheel {
  width: 88px;
  height: 160px;
  overflow: hidden;
  border-radius: 14px;
  background: var(--wheel-bg);
  border: 2px solid var(--wheel-bdr);
  position: relative;
  cursor: ns-resize;
  user-select: none;
  transition: background 0.4s, border-color 0.4s;
}

.wheel::before, .wheel::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 50px;
  z-index: 2;
  pointer-events: none;
}
.wheel::before { top: 0;    background: linear-gradient(to bottom, var(--wheel-bg), transparent); }
.wheel::after  { bottom: 0; background: linear-gradient(to top,   var(--wheel-bg), transparent); }

.wheel-sel {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  left: 4px; right: 4px;
  height: 44px;
  border-radius: 8px;
  background: rgba(255,255,255,0.06);
  border: 2px solid var(--accent);
  opacity: 0.6;
  z-index: 1;
  pointer-events: none;
  transition: border-color 0.4s;
}

.wheel-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: transform 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  will-change: transform;
}

.wheel-item {
  height: 44px;
  line-height: 44px;
  font-size: 1.6rem;
  font-weight: 700;
  color: rgba(255,255,255,0.25);
  text-align: center;
  width: 100%;
  flex-shrink: 0;
}
.wheel-item.active { color: #fff; font-size: 1.9rem; }

/* ── Modal Buttons ──────────────────────────────────────────── */
#modal-start {
  width: 100%;
  padding: 14px;
  font-size: 1.15rem;
  font-weight: bold;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  background: linear-gradient(135deg, var(--go-from), var(--go-to));
  color: var(--go-txt);
  margin-top: 6px;
  transition: opacity 0.2s, transform 0.1s;
}
#modal-start:disabled { opacity: 0.3; cursor: not-allowed; }
#modal-start:not(:disabled):hover  { transform: scale(1.02); }
#modal-start:not(:disabled):active { transform: scale(0.97); }

#modal-cancel {
  width: 100%;
  padding: 10px;
  font-size: 0.95rem;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  background: transparent;
  color: rgba(255,255,255,0.35);
  margin-top: 8px;
  transition: color 0.2s;
}
#modal-cancel:hover { color: rgba(255,255,255,0.8); }

/* ── Timer Cards ────────────────────────────────────────────── */
.timer-card {
  width: 220px;
  border-radius: 24px;
  padding: 18px 16px 16px;
  text-align: center;
  position: relative;
  background: linear-gradient(145deg, var(--card-from), var(--card-to));
  border: 3px solid var(--card-border);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 0 0 var(--accent-glow);
  animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  transition: transform 0.2s, border-color 0.4s, background 0.4s;
}
.timer-card:hover:not(.done) { transform: translateY(-3px); }

.timer-activity {
  font-size: 0.75rem;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--card-sub);
  margin-bottom: 10px;
  transition: color 0.4s;
}

/* ── Progress Ring ──────────────────────────────────────────── */
.ring-wrap {
  position: relative;
  width: 148px;
  height: 148px;
  margin: 0 auto 12px;
}

.ring-svg { transform: rotate(-90deg); }

.ring-bg {
  fill: none;
  stroke: rgba(255,255,255,0.08);
  stroke-width: 9;
}

.ring-fill {
  fill: none;
  stroke: var(--accent);
  stroke-width: 9;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s linear, stroke 0.4s;
}

.ring-warn { stroke: #ff6b35; }
.ring-low  { stroke: #ff4444; }

.ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}

.timer-icon-el {
  font-size: 1.8rem;
  line-height: 1;
}

.timer-time {
  font-size: 1.75rem;
  font-weight: 900;
  letter-spacing: 1px;
  font-variant-numeric: tabular-nums;
  color: #fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
}

/* ── Done State ─────────────────────────────────────────────── */
.done-text {
  font-size: 1.3rem;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--accent);
  animation: pulse 0.5s infinite alternate;
}

/* ── Card Controls ──────────────────────────────────────────── */
.card-controls { display: flex; gap: 8px; justify-content: center; }

.ctrl-btn {
  border: none;
  border-radius: 50px;
  padding: 8px 22px;
  font-size: 0.88rem;
  font-weight: bold;
  cursor: pointer;
  background: var(--btn-bg);
  color: var(--btn-txt);
  transition: background 0.15s, transform 0.1s;
}
.ctrl-btn:hover  { background: var(--btn-hover); }
.ctrl-btn:active { transform: scale(0.93); }

.remove-btn {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(0,0,0,0.22);
  border: none;
  color: rgba(255,255,255,0.6);
  border-radius: 50%;
  width: 28px; height: 28px;
  cursor: pointer;
  font-size: 0.8rem;
  line-height: 28px;
  text-align: center;
  transition: background 0.15s, color 0.15s;
}
.remove-btn:hover { background: rgba(220,50,50,0.55); color: #fff; }

/* ── Math Modal ─────────────────────────────────────────────── */
#math-overlay { z-index: 200; background: rgba(0,0,0,0.88); }

#math-modal {
  background: var(--modal-bg);
  border: 3px solid var(--modal-bdr);
  border-radius: 28px;
  padding: 32px 24px 28px;
  width: 320px;
  max-width: 95vw;
  text-align: center;
  box-shadow: 0 24px 60px rgba(0,0,0,0.7);
  transition: background 0.4s, border-color 0.4s;
}

#math-emoji    { font-size: 3.5rem; margin-bottom: 6px; }

#math-question {
  font-size: 2.7rem;
  font-weight: 900;
  color: #fff;
  letter-spacing: 2px;
  min-height: 54px;
  margin-bottom: 6px;
}

#math-hint {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.4);
  margin-bottom: 4px;
}

#math-feedback {
  font-size: 1.05rem;
  font-weight: bold;
  min-height: 28px;
  margin-bottom: 18px;
  color: var(--accent);
  transition: color 0.4s;
}

#math-numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.num-btn {
  padding: 18px 0;
  font-size: 1.55rem;
  font-weight: 900;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  background: rgba(255,255,255,0.08);
  color: #fff;
  transition: background 0.12s, transform 0.1s;
  touch-action: manipulation;
}
.num-btn:hover  { background: rgba(255,255,255,0.15); }
.num-btn:active { transform: scale(0.89); background: rgba(255,255,255,0.22); }

.del-btn { color: #ff9090; }

.go-btn {
  background: linear-gradient(135deg, var(--go-from), var(--go-to));
  color: var(--go-txt);
}
.go-btn:hover { opacity: 0.88; }

/* ── Animations ─────────────────────────────────────────────── */
@keyframes popIn {
  from { transform: scale(0.35) translateY(20px); opacity: 0; }
  to   { transform: scale(1)    translateY(0);    opacity: 1; }
}

@keyframes flash {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.25; transform: scale(1.05); }
}

@keyframes pulse {
  from { opacity: 1; transform: scale(1); }
  to   { opacity: 0.55; transform: scale(0.96); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%       { transform: translateX(-12px); }
  40%       { transform: translateX(12px); }
  60%       { transform: translateX(-8px); }
  80%       { transform: translateX(8px); }
}

@keyframes correctBounce {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.1); }
  70%  { transform: scale(0.94); }
  100% { transform: scale(1); }
}

@keyframes ringPulse {
  0%, 100% { filter: drop-shadow(0 0 0px var(--accent)); }
  50%       { filter: drop-shadow(0 0 8px var(--accent)); }
}

.timer-card.flashing { animation: flash 0.45s ease-in-out 5; }
.shake               { animation: shake 0.4s ease; }
.correct-bounce      { animation: correctBounce 0.4s ease; }
.ring-low-pulse      { animation: ringPulse 0.8s ease-in-out infinite; }
</style>
</head>
<body class="mario">

<!-- ── Header ───────────────────────────────────────────────── -->
<div class="header">
  <h1 id="page-title">⭐ Alan's Timers!</h1>
  <div class="theme-toggle">
    <button class="theme-opt active" id="btn-mario" onclick="setTheme('mario')">⭐ Mario</button>
    <button class="theme-opt" id="btn-roomba" onclick="setTheme('roomba')"></button>
  </div>
</div>

<button id="add-btn">＋ New Timer</button>
<div id="timers-grid"></div>

<!-- ── New Timer Modal ──────────────────────────────────────── -->
<div id="modal-overlay" class="overlay">
  <div id="modal" class="modal-box">
    <h2 id="modal-title">🎮 New Timer</h2>

    <div class="modal-section">
      <label>What timer?</label>
      <div class="activity-grid" id="activity-grid"></div>
    </div>

    <div class="modal-section">
      <label>How long?</label>
      <div class="wheel-container">
        <div class="wheel-col">
          <div class="wheel-lbl">Minutes</div>
          <button class="wheel-btn" id="min-up">▲</button>
          <div class="wheel" id="wheel-min">
            <div class="wheel-sel"></div>
            <div class="wheel-inner" id="wheel-min-inner"></div>
          </div>
          <button class="wheel-btn" id="min-down">▼</button>
        </div>
        <div class="wheel-sep">:</div>
        <div class="wheel-col">
          <div class="wheel-lbl">Seconds</div>
          <button class="wheel-btn" id="sec-up">▲</button>
          <div class="wheel" id="wheel-sec">
            <div class="wheel-sel"></div>
            <div class="wheel-inner" id="wheel-sec-inner"></div>
          </div>
          <button class="wheel-btn" id="sec-down">▼</button>
        </div>
      </div>
    </div>

    <button id="modal-start" disabled>▶ Start Timer!</button>
    <button id="modal-cancel">Cancel</button>
  </div>
</div>

<!-- ── Math Challenge Modal ──────────────────────────────────── -->
<div id="math-overlay" class="overlay">
  <div id="math-modal">
    <div id="math-emoji">⭐</div>
    <div id="math-question"></div>
    <div id="math-hint">Tap the numbers below</div>
    <div id="math-feedback"></div>
    <div id="math-numpad">
      <button class="num-btn" data-v="7">7</button>
      <button class="num-btn" data-v="8">8</button>
      <button class="num-btn" data-v="9">9</button>
      <button class="num-btn" data-v="4">4</button>
      <button class="num-btn" data-v="5">5</button>
      <button class="num-btn" data-v="6">6</button>
      <button class="num-btn" data-v="1">1</button>
      <button class="num-btn" data-v="2">2</button>
      <button class="num-btn" data-v="3">3</button>
      <button class="num-btn del-btn" data-v="del">⌫</button>
      <button class="num-btn" data-v="0">0</button>
      <button class="num-btn go-btn"  data-v="go">✓</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ── Audio ─────────────────────────────────────────────────── */
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function tone(type, freq, start, dur, gainPeak = 0.25) {
  const osc = ctx.createOscillator();
  const g   = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(0, start);
  g.gain.linearRampToValueAtTime(gainPeak, start + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, start + dur);
  osc.start(start); osc.stop(start + dur + 0.01);
}

function noise(start, dur, gain = 0.15) {
  const buf  = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * gain;
  const src = ctx.createBufferSource();
  const g   = ctx.createGain();
  src.buffer = buf; src.connect(g); g.connect(ctx.destination);
  g.gain.setValueAtTime(gain, start);
  g.gain.exponentialRampToValueAtTime(0.001, start + dur);
  src.start(start);
}

function playMarioDone() {
  const t = ctx.currentTime;
  // Coin: E6 → B6
  [[1319, t+0.06, 0.18], [1976, t+0.14, 0.18]].forEach(([f,s,d]) => tone('square', f, s, d, 0.3));
  // 1-Up jingle: E5 G5 E6 C6 D6 G6
  [659,784,1319,1047,1175,1568].forEach((f,i) => tone('square', f, t+0.5+i*0.09, 0.1, 0.22));
}

function playRoombaDone() {
  const t = ctx.currentTime;
  // Motor wind-down
  const motor = ctx.createOscillator(), mg = ctx.createGain();
  motor.connect(mg); mg.connect(ctx.destination);
  motor.type = 'sawtooth';
  motor.frequency.setValueAtTime(600, t);
  motor.frequency.exponentialRampToValueAtTime(60, t + 0.7);
  mg.gain.setValueAtTime(0.18, t);
  mg.gain.linearRampToValueAtTime(0.08, t + 0.5);
  mg.gain.exponentialRampToValueAtTime(0.001, t + 0.75);
  motor.start(t); motor.stop(t + 0.8);
  // Brush clicks
  [0.2, 0.38, 0.52].forEach(o => noise(t + o, 0.04, 0.4));
  // D-major chime
  [[587, 0.85], [740, 1.0], [880, 1.15]].forEach(([f,o]) => tone('sine', f, t+o, 0.33, 0.3));
}

function playCorrect() {
  [494,988,740,622,831].forEach((f,i) => tone('square', f, ctx.currentTime+i*0.08, 0.1, 0.22));
}

function playWrong() {
  tone('sawtooth', 180, ctx.currentTime, 0.3, 0.2);
}

function playTick() {
  tone('sine', 880, ctx.currentTime, 0.05, 0.08);
}

/* ── SVG Icons ─────────────────────────────────────────────── */
function roombaSVG(w, h) {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="${w}" height="${h}" style="display:inline-block;vertical-align:middle">
    <circle cx="32" cy="36" r="24" fill="#455a64"/>
    <circle cx="32" cy="36" r="20" fill="#546e7a"/>
    <ellipse cx="32" cy="14" rx="8" ry="5" fill="#455a64"/>
    <ellipse cx="32" cy="13" rx="5" ry="3" fill="#69f0ae"/>
    <circle cx="24" cy="30" r="3.5" fill="#263238"/>

/* ── Theme ─────────────────────────────────────────────────── */

// Init Roomba button with SVG
document.getElementById('btn-roomba').innerHTML = roombaSVG(20,25) + ' Roomba';
setTheme('mario');

/* ── Activities ────────────────────────────────────────────── */
const ACTIVITIES = [
  { id:'tv',      label:'📺 TV Time'    },
  { id:'hw',      label:'📚 Homework'   },
  { id:'free',    label:'🎮 Free Time'  },
  { id:'play',    label:'🏃 Playtime'   },
  { id:'bath',    label:'🛁 Bath Time'  },
  { id:'read',    label:'📖 Reading'    },
  { id:'dinner',  label:'🍽️ Dinner'    },
  { id:'outside', label:'🌳 Outside'    },
];

let selAct = null;

const actGrid = document.getElementById('activity-grid');
ACTIVITIES.forEach(a => {
  const btn = document.createElement('button');

  btn.textContent = a.label;

/* ── Wheel Picker ──────────────────────────────────────────── */
function buildWheel(id, innerId, count, pad) {
  const wrap  = document.getElementById(id);
  const inner = document.getElementById(innerId);
  const H     = 44;
  let cur = 0;

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className   = 'wheel-item';
    el.textContent = pad ? String(i).padStart(2,'0') : String(i);
    inner.appendChild(el);
  }
  const items = Array.from(inner.children);

  function snap(idx, anim = true) {
    idx = Math.max(0, Math.min(count - 1, idx));
    cur = idx;
    const off = (wrap.clientHeight / 2) - (H / 2) - idx * H;
    if (!anim) inner.style.transition = 'none';
    inner.style.transform = `translateY(${off}px)`;
    if (!anim) requestAnimationFrame(() => { inner.style.transition = ''; });
    items.forEach((el, i) => el.classList.toggle('active', i === idx));
  }

  requestAnimationFrame(() => snap(0, false));

  let y0 = 0, i0 = 0, drag = false;

  wrap.addEventListener('mousedown',  e => { drag = true;  y0 = e.clientY; i0 = cur; inner.style.transition = 'none'; });
  window.addEventListener('mousemove',e => { if (drag) snap(i0 + Math.round((y0 - e.clientY) / H), false); });
  window.addEventListener('mouseup',  () => { drag = false; inner.style.transition = ''; });

  wrap.addEventListener('touchstart', e => { drag = true;  y0 = e.touches[0].clientY; i0 = cur; inner.style.transition = 'none'; }, { passive: true });
  wrap.addEventListener('touchmove',  e => { if (drag) snap(i0 + Math.round((y0 - e.touches[0].clientY) / H), false); }, { passive: true });
  wrap.addEventListener('touchend',   () => { drag = false; inner.style.transition = ''; });

  wrap.addEventListener('wheel', e => { e.preventDefault(); snap(cur + (e.deltaY > 0 ? 1 : -1)); }, { passive: false });

  return { get: () => cur, snap };
}

const mWheel = buildWheel('wheel-min', 'wheel-min-inner', 60, true);
const sWheel = buildWheel('wheel-sec', 'wheel-sec-inner', 60, true);

document.getElementById('min-up').addEventListener('click',   () => mWheel.snap(mWheel.get() - 1));
document.getElementById('min-down').addEventListener('click', () => mWheel.snap(mWheel.get() + 1));
document.getElementById('sec-up').addEventListener('click',   () => sWheel.snap(sWheel.get() - 1));
document.getElementById('sec-down').addEventListener('click', () => sWheel.snap(sWheel.get() + 1));

/* ── Modal Logic ───────────────────────────────────────────── */
const modalEl  = document.getElementById('modal-overlay');
const startBtn = document.getElementById('modal-start');

function checkReady() {
  startBtn.disabled = !(selAct && (mWheel.get() > 0 || sWheel.get() > 0));
}

document.getElementById('add-btn').addEventListener('click', () => {
  selAct = null;
  document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('selected'));
  startBtn.disabled = true;
  modalEl.classList.add('open');
  if (ctx.state === 'suspended') ctx.resume();
});

document.getElementById('modal-cancel').addEventListener('click', () => modalEl.classList.remove('open'));
modalEl.addEventListener('click', e => { if (e.target === modalEl) modalEl.classList.remove('open'); });

['wheel-min','wheel-sec'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('mouseup',  checkReady);
  el.addEventListener('touchend', checkReady);
  el.addEventListener('wheel',    () => setTimeout(checkReady, 120));
});

startBtn.addEventListener('click', () => {
  const total = mWheel.get() * 60 + sWheel.get();
  if (!total || !selAct) return;
  modalEl.classList.remove('open');
  showMath(selAct, theme, total);
});

/* ── Timer Cards ───────────────────────────────────────────── */
let cardCount = 0;

function fmt(s) {
  const m = Math.floor(s / 60), r = s % 60;
  return m > 0 ? `${m}:${String(r).padStart(2,'0')}` : `${s}s`;
}

function createTimer(act, cardTheme, total) {
  cardCount++;
  const id   = `tc-${cardCount}`;
  const R    = 56;
  const CIRC = 2 * Math.PI * R;
  const icon = cardTheme === 'mario' ? '⭐' : roombaSVG(36, 45);

  const card = document.createElement('div');
  card.className = 'timer-card';
  card.id = id;
  card.innerHTML = `
    <button class="remove-btn" title="Remove">✕</button>
    <div class="timer-activity">${act.label}</div>
    <div class="ring-wrap">
      <svg class="ring-svg" width="148" height="148" viewBox="0 0 148 148">
        <circle class="ring-bg"   cx="74" cy="74" r="${R}"/>
        <circle class="ring-fill" cx="74" cy="74" r="${R}"
          stroke-dasharray="${CIRC.toFixed(2)}"
          stroke-dashoffset="0"/>
      </svg>
      <div class="ring-center">
        <div class="timer-icon-el">${icon}</div>
        <div class="timer-time">${fmt(total)}</div>
      </div>
    </div>
    <div class="card-controls">
      <button class="ctrl-btn pause-btn">⏸ Pause</button>
    </div>`;

  document.getElementById('timers-grid').appendChild(card);

  const timeEl  = card.querySelector('.timer-time');
  const fillEl  = card.querySelector('.ring-fill');
  const pauseEl = card.querySelector('.pause-btn');
  const ringW   = card.querySelector('.ring-wrap');

  // Suppress initial transition
  fillEl.style.transition = 'none';
  fillEl.style.strokeDashoffset = '0';
  requestAnimationFrame(() => requestAnimationFrame(() => { fillEl.style.transition = ''; }));

  let rem     = total;
  let running = true;
  let iv      = null;

  function updateRing() {
    const pct = rem / total;
    fillEl.style.strokeDashoffset = (CIRC * (1 - pct)).toFixed(2);

    // Color shift: warn at 30%, red at 10%
    fillEl.classList.remove('ring-warn', 'ring-low');
    if (pct <= 0.1) {
      fillEl.classList.add('ring-low');
      ringW.classList.add('ring-low-pulse');
    } else if (pct <= 0.3) {
      fillEl.classList.add('ring-warn');
      ringW.classList.remove('ring-low-pulse');
    } else {
      ringW.classList.remove('ring-low-pulse');
    }
  }

  function tick() {
    rem--;
    timeEl.textContent = fmt(rem);
    updateRing();

    // Tick sound in last 10 seconds
    if (rem > 0 && rem <= 10) playTick();

    if (rem <= 0) {
      clearInterval(iv);
      card.classList.add('done');
      timeEl.innerHTML = `<span class="done-text">DONE!</span>`;
      pauseEl.style.display = 'none';
      fillEl.style.strokeDashoffset = CIRC.toFixed(2);
      ringW.classList.remove('ring-low-pulse');

      if (cardTheme === 'mario') playMarioDone(); else playRoombaDone();
      card.classList.add('flashing');

      setTimeout(() => {
        card.style.transition = 'opacity 0.5s, transform 0.5s';
        card.style.opacity    = '0';
        card.style.transform  = 'scale(0.4)';
        setTimeout(() => card.remove(), 500);
      }, 2200);
    }
  }

  function go() { iv = setInterval(tick, 1000); }
  go();

  pauseEl.addEventListener('click', () => {
    if (running) { clearInterval(iv); pauseEl.textContent = '▶ Resume'; }
    else         { go();              pauseEl.textContent = '⏸ Pause'; }
    running = !running;
  });

  card.querySelector('.remove-btn').addEventListener('click', () => {
    clearInterval(iv);
    card.style.transition = 'opacity 0.2s, transform 0.2s';
    card.style.opacity    = '0';
    card.style.transform  = 'scale(0.4)';
    setTimeout(() => card.remove(), 200);
  });
}

/* ── Math Challenge ────────────────────────────────────────── */
let mathAns = null, mathIn = '', mathAct = null, mathTheme = null, mathTotal = 0;

function genQ() {
  const add = Math.random() < 0.5;
  const a   = Math.floor(Math.random() * 9) + 1;
  const b   = add ? Math.floor(Math.random() * 9) + 1
                  : Math.floor(Math.random() * a) + 1;
  return { text: `${a} ${add?'+':'-'} ${b} = ?`, ans: add ? a+b : a-b };
}

function showMath(act, t, total) {
  const q = genQ();
  mathAns = q.ans; mathIn = ''; mathAct = act; mathTheme = t; mathTotal = total;
  document.getElementById('math-question').textContent = q.text;
  document.getElementById('math-feedback').textContent = "What's the answer?";
  document.getElementById('math-emoji').textContent = t === 'mario' ? '⭐' : '🤖';
  document.getElementById('math-overlay').classList.add('open');
}

function updateMathDisplay() {
  const qEl  = document.getElementById('math-question');
  const base = qEl.textContent.split('=')[0].trim();
  qEl.textContent = `${base} = ${mathIn || '?'}`;
}

function submitMath() {
  const val = parseInt(mathIn);
  if (isNaN(val)) {
    document.getElementById('math-feedback').textContent = 'Type a number first!';
    return;
  }
  if (val === mathAns) {
    document.getElementById('math-feedback').textContent = '🎉 Correct! Starting...';
    const modal = document.getElementById('math-modal');
    modal.classList.add('correct-bounce');
    playCorrect();
    setTimeout(() => {
      modal.classList.remove('correct-bounce');
      document.getElementById('math-overlay').classList.remove('open');
      createTimer(mathAct, mathTheme, mathTotal);
    }, 700);
  } else {
    document.getElementById('math-feedback').textContent = 'Try again! 💪';
    document.getElementById('math-modal').classList.add('shake');
    mathIn = '';
    updateMathDisplay();
    playWrong();
    setTimeout(() => document.getElementById('math-modal').classList.remove('shake'), 400);
  }
}

document.querySelectorAll('.num-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.v;
    if      (v === 'del') { mathIn = mathIn.slice(0, -1); }
    else if (v === 'go')  { submitMath(); return; }
    else                  { if (mathIn.length < 2) mathIn += v; }
    updateMathDisplay();
  });
});

// Keyboard support for math
document.addEventListener('keydown', e => {
  if (!document.getElementById('math-overlay').classList.contains('open')) return;
  if (e.key >= '0' && e.key <= '9')  { if (mathIn.length < 2) mathIn += e.key; updateMathDisplay(); }
  else if (e.key === 'Backspace')    { mathIn = mathIn.slice(0,-1); updateMathDisplay(); }
  else if (e.key === 'Enter')        { submitMath(); }
});
</script>
