<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alan's Timers! ⭐🤖</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #fff;
    font-size: 2rem;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(255,220,0,0.6);
    letter-spacing: 2px;
  }

  #add-btn {
    display: block;
    margin: 0 auto 30px;
    padding: 16px 40px;
    font-size: 1.5rem;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color: #333;
    box-shadow: 0 4px 20px rgba(255,210,0,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #add-btn:hover { transform: scale(1.05); box-shadow: 0 6px 25px rgba(255,210,0,0.6); }
  #add-btn:active { transform: scale(0.97); }

  #timers-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
  }

  /* Modal */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }

  #modal {
    background: #1e1e3a;
    border-radius: 20px;
    padding: 30px;
    width: 340px;
    max-width: 95vw;
    color: #fff;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  #modal h2 { text-align: center; margin-bottom: 20px; font-size: 1.4rem; }

  .modal-section { margin-bottom: 20px; }
  .modal-section label { display: block; margin-bottom: 8px; font-weight: bold; color: #aac4ff; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

  .theme-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .theme-btn {
    flex: 1;
    min-width: 80px;
    padding: 12px 8px;
    border: 2px solid transparent;
    border-radius: 12px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: bold;
    transition: all 0.15s;
    background: #2a2a4a;
    color: #fff;
  }
  .theme-btn:hover { background: #3a3a6a; }
  .theme-btn.selected {
    border-color: #ffd200;
    background: #3a3a6a;
    box-shadow: 0 0 12px rgba(255,210,0,0.4);
  }

  /* Wheel Picker */
  .wheel-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .wheel-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .wheel-label {
    font-size: 0.75rem;
    color: #aac4ff;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: bold;
  }
  .wheel-sep {
    font-size: 2.5rem;
    font-weight: 900;
    color: #fff;
    margin-top: 20px;
  }
  .wheel {
    width: 90px;
    height: 160px;
    overflow: hidden;
    border-radius: 14px;
    background: #12122a;
    border: 2px solid #3a3a6a;
    position: relative;
    cursor: ns-resize;
    user-select: none;
  }
  .wheel::before, .wheel::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 48px;
    z-index: 2;
    pointer-events: none;
  }
  .wheel::before {
    top: 0;
    background: linear-gradient(to bottom, #12122a, transparent);
  }
  .wheel::after {
    bottom: 0;
    background: linear-gradient(to top, #12122a, transparent);
  }
  .wheel-selector {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    left: 4px; right: 4px;
    height: 44px;
    border-radius: 8px;
    background: rgba(255,210,0,0.15);
    border: 2px solid rgba(255,210,0,0.5);
    z-index: 1;
    pointer-events: none;
  }
  .wheel-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    will-change: transform;
  }
  .wheel-item {
    height: 44px;
    line-height: 44px;
    font-size: 1.6rem;
    font-weight: 700;
    color: #888;
    text-align: center;
    width: 100%;
    transition: color 0.1s, font-size 0.1s;
    flex-shrink: 0;
  }
  .wheel-item.active {
    color: #fff;
    font-size: 1.9rem;
  }

  #modal-start {
    width: 100%;
    padding: 14px;
    font-size: 1.2rem;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: linear-gradient(135deg, #11998e, #38ef7d);
    color: #fff;
    margin-top: 5px;
    transition: opacity 0.2s;
  }
  #modal-start:disabled { opacity: 0.4; cursor: not-allowed; }
  #modal-cancel {
    width: 100%;
    padding: 10px;
    font-size: 1rem;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: transparent;
    color: #888;
    margin-top: 8px;
  }
  #modal-cancel:hover { color: #fff; }

  /* Timer Cards */
  .timer-card {
    width: 220px;
    border-radius: 20px;
    padding: 24px 20px 20px;
    text-align: center;
    position: relative;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    transition: transform 0.2s;
    animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* Mario theme */
  .timer-card.mario {
    background: linear-gradient(135deg, #e52d27, #b31217);
    border: 3px solid #ffd200;
  }
  .timer-card.mario .timer-icon { color: #ffd200; }
  .timer-card.mario .timer-time { color: #fff; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }
  .timer-card.mario .timer-label { color: #ffeb80; }
  .timer-card.mario .ctrl-btn { background: #ffd200; color: #333; }
  .timer-card.mario .ctrl-btn:hover { background: #ffe44d; }

  /* Roomba theme */
  .timer-card.roomba {
    background: linear-gradient(135deg, #37474f, #263238);
    border: 3px solid #69f0ae;
  }
  .timer-card.roomba .timer-icon { color: #69f0ae; }
  .timer-card.roomba .timer-time { color: #e0ffe8; text-shadow: 0 0 10px rgba(105,240,174,0.5); }
  .timer-card.roomba .timer-label { color: #69f0ae; }
  .timer-card.roomba .ctrl-btn { background: #69f0ae; color: #263238; }
  .timer-card.roomba .ctrl-btn:hover { background: #b9fbd5; }

  .timer-icon { font-size: 2.5rem; margin-bottom: 8px; display: block; line-height: 1; }
  .timer-icon svg { display: inline-block; vertical-align: middle; }
  .timer-time {
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
  }
  .timer-label { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; opacity: 0.85; }

  .card-controls { display: flex; gap: 8px; justify-content: center; }
  .ctrl-btn {
    border: none;
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 0.9rem;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .ctrl-btn:active { transform: scale(0.95); }
  .remove-btn {
    position: absolute;
    top: 10px; right: 10px;
    background: rgba(0,0,0,0.3);
    border: none;
    color: #fff;
    border-radius: 50%;
    width: 26px; height: 26px;
    cursor: pointer;
    font-size: 0.8rem;
    line-height: 26px;
    text-align: center;
  }
  .remove-btn:hover { background: rgba(255,50,50,0.6); }

  /* Flash animation */
  @keyframes flash {
    0%, 100% { opacity: 1; transform: scale(1); }
    25% { opacity: 0.2; transform: scale(1.08); }
    75% { opacity: 0.2; transform: scale(1.08); }
  }
  .timer-card.flashing {
    animation: flash 0.4s ease-in-out 4;
  }

  .done-label {
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: 3px;
    animation: pulse 0.5s infinite alternate;
  }
  @keyframes pulse {
    from { opacity: 1; }
    to { opacity: 0.5; }
  }

  /* Math Challenge */
  #math-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #math-overlay.open { display: flex; }

  #math-modal {
    background: #1e1e3a;
    border-radius: 24px;
    padding: 30px 24px;
    width: 320px;
    max-width: 95vw;
    text-align: center;
    box-shadow: 0 10px 50px rgba(0,0,0,0.6);
    border: 2px solid #ffd200;
  }

  #math-emoji { font-size: 3rem; margin-bottom: 10px; }

  #math-question {
    font-size: 2.8rem;
    font-weight: 900;
    color: #fff;
    margin-bottom: 8px;
    letter-spacing: 2px;
    min-height: 50px;
  }

  #math-feedback {
    font-size: 1.1rem;
    font-weight: bold;
    min-height: 30px;
    margin-bottom: 16px;
    color: #ffd200;
  }

  #math-numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .num-btn {
    padding: 18px 0;
    font-size: 1.6rem;
    font-weight: 900;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    background: #2a2a4a;
    color: #fff;
    transition: transform 0.1s, background 0.1s;
    touch-action: manipulation;
  }
  .num-btn:hover { background: #3a3a6a; }
  .num-btn:active { transform: scale(0.92); background: #4a4a8a; }
  .del-btn { background: #3a2a2a; color: #ff8080; }
  .del-btn:hover { background: #4a3a3a; }
  .go-btn { background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; }
  .go-btn:hover { opacity: 0.9; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(8px); }
  }
  .shake { animation: shake 0.4s ease; }

  @keyframes correctPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  .correct-pop { animation: correctPop 0.3s ease; }
</style>
</head>
<body>

<h1 id="page-title">⭐ Alan's Timers </h1>
<button id="add-btn">＋ Add Timer</button>
<div id="timers-grid"></div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>🎮 New Timer</h2>
    <div class="modal-section">
      <label>Choose Theme</label>
      <div class="theme-btns">
        <button class="theme-btn" data-theme="mario">⭐ Mario</button>
        <button class="theme-btn" data-theme="roomba" id="roomba-theme-btn"> Roomba</button>
      </div>
    </div>
    <div class="modal-section">
      <label>Choose Time</label>
      <div class="wheel-container">
        <div class="wheel-col">
          <div class="wheel-label">Minutes</div>
          <div class="wheel" id="wheel-minutes">
            <div class="wheel-inner" id="wheel-minutes-inner"></div>
          </div>
        </div>
        <div class="wheel-sep">:</div>
        <div class="wheel-col">
          <div class="wheel-label">Seconds</div>
          <div class="wheel" id="wheel-seconds">
            <div class="wheel-inner" id="wheel-seconds-inner"></div>
          </div>
        </div>
      </div>
    </div>
    <button id="modal-start" disabled>▶ Start Timer!</button>
    <button id="modal-cancel">Cancel</button>
  </div>
</div>

<!-- Math Challenge Modal -->
<div id="math-overlay">
  <div id="math-modal">
    <div id="math-emoji">🧠</div>
    <div id="math-question"></div>
    <div id="math-feedback"></div>
    <div id="math-numpad">
      <button class="num-btn" data-val="7">7</button>
      <button class="num-btn" data-val="8">8</button>
      <button class="num-btn" data-val="9">9</button>
      <button class="num-btn" data-val="4">4</button>
      <button class="num-btn" data-val="5">5</button>
      <button class="num-btn" data-val="6">6</button>
      <button class="num-btn" data-val="1">1</button>
      <button class="num-btn" data-val="2">2</button>
      <button class="num-btn" data-val="3">3</button>
      <button class="num-btn del-btn" data-val="del">⌫</button>
      <button class="num-btn" data-val="0">0</button>
      <button class="num-btn go-btn" data-val="go">✓</button>
    </div>
  </div>
</div>

<script>
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function roombaSVG(w, h) {
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="${w}" height="${h}" style="display:inline-block;vertical-align:middle">
      <circle cx="32" cy="36" r="24" fill="#455a64"/>
      <circle cx="32" cy="36" r="20" fill="#546e7a"/>
      <ellipse cx="32" cy="14" rx="8" ry="5" fill="#455a64"/>
      <ellipse cx="32" cy="13" rx="5" ry="3" fill="#69f0ae"/>
      <circle cx="24" cy="30" r="3.5" fill="#263238"/>
      <circle cx="40" cy="30" r="3.5" fill="#263238"/>
      <circle cx="25" cy="29" r="1.2" fill="#69f0ae"/>
      <circle cx="41" cy="29" r="1.2" fill="#69f0ae"/>
      <path d="M24 42 Q32 50 40 42" stroke="#69f0ae" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <rect x="20" y="57" width="24" height="4" rx="2" fill="#37474f"/>
      <rect x="23" y="57" width="3" height="4" rx="1" fill="#69f0ae"/>
      <rect x="30" y="57" width="3" height="4" rx="1" fill="#69f0ae"/>
      <rect x="37" y="57" width="3" height="4" rx="1" fill="#69f0ae"/>
    </svg>`;
  }

  function playMarioSound() {
    const ctx = audioCtx;
    const t0 = ctx.currentTime;

    // ── Coin collect (the iconic "bling") ──────────────────────
    // Square wave, two-note: E6 then B6, very short attack
    function coin(startT) {
      [[1319, 0.06], [1976, 0.14]].forEach(([freq, offset]) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'square';
        osc.frequency.value = freq;
        const t = startT + offset;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.3, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
        osc.start(t); osc.stop(t + 0.2);
      });
    }

    // ── 1-Up jingle (6-note rising sequence) ──────────────────
    // E5 G5 E6 C6 D6 G6
    function oneUp(startT) {
      const notes = [659, 784, 1319, 1047, 1175, 1568];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'square';
        osc.frequency.value = freq;
        const t = startT + i * 0.09;
        gain.gain.setValueAtTime(0.22, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        osc.start(t); osc.stop(t + 0.12);
      });
    }

    // Play coin first, then 1-up jingle
    coin(t0);
    oneUp(t0 + 0.45);
  }

  function playRoombaSound() {
    const ctx = audioCtx;
    const t0 = ctx.currentTime;

    // ── Motor wind-down ────────────────────────────────────────
    // Sawtooth sweep 600 → 60 Hz (vacuum motor slowing to a stop)
    const motor = ctx.createOscillator();
    const motorGain = ctx.createGain();
    motor.connect(motorGain); motorGain.connect(ctx.destination);
    motor.type = 'sawtooth';
    motor.frequency.setValueAtTime(600, t0);
    motor.frequency.exponentialRampToValueAtTime(60, t0 + 0.7);
    motorGain.gain.setValueAtTime(0.18, t0);
    motorGain.gain.linearRampToValueAtTime(0.08, t0 + 0.5);
    motorGain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.75);
    motor.start(t0); motor.stop(t0 + 0.8);

    // ── Brush roll click-click ─────────────────────────────────
    // Short noise bursts simulating the brush slowing down
    [0.2, 0.38, 0.52].forEach(offset => {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.4;
      const src = ctx.createBufferSource();
      const g = ctx.createGain();
      src.buffer = buf;
      src.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.12, t0 + offset);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + offset + 0.04);
      src.start(t0 + offset);
    });

    // ── Roomba "done" chime: 3 clean sine tones ────────────────
    // The real Roomba plays a rising 3-note melody when done
    // Approx: D5 → F#5 → A5 (a D major chord ascending)
    [[587, 0.85], [740, 1.0], [880, 1.15]].forEach(([freq, offset]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t0 + offset);
      gain.gain.linearRampToValueAtTime(0.3, t0 + offset + 0.02);
      gain.gain.setValueAtTime(0.3, t0 + offset + 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + offset + 0.35);
      osc.start(t0 + offset); osc.stop(t0 + offset + 0.4);
    });
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    if (m > 0) return `${m}:${sec.toString().padStart(2, '0')}`;
    return `${sec}s`;
  }

  let timerCount = 0;
  const activeTimers = {}; // id -> { remaining }

  function sortTimers() {
    const grid = document.getElementById('timers-grid');
    const cards = Array.from(grid.children);
    cards.sort((a, b) => {
      const ra = activeTimers[a.id] !== undefined ? activeTimers[a.id] : Infinity;
      const rb = activeTimers[b.id] !== undefined ? activeTimers[b.id] : Infinity;
      return ra - rb;
    });
    cards.forEach(card => grid.appendChild(card));
  }

  function createTimer(theme, seconds) {
    timerCount++;
    const id = `timer-${timerCount}`;
    const icon = theme === 'mario' ? '⭐' : roombaSVG(48, 60);
    const label = theme === 'mario' ? 'Mario Timer' : 'Roomba Timer';

    const card = document.createElement('div');
    card.className = `timer-card ${theme}`;
    card.id = id;
    card.innerHTML = `
      <button class="remove-btn" title="Remove">✕</button>
      <span class="timer-icon">${icon}</span>
      <div class="timer-time">${formatTime(seconds)}</div>
      <div class="timer-label">${label}</div>
      <div class="card-controls">
        <button class="ctrl-btn pause-btn">⏸ Pause</button>
      </div>
    `;

    document.getElementById('timers-grid').appendChild(card);

    let remaining = seconds;
    activeTimers[id] = remaining;
    let running = true;
    let interval = null;

    const timeEl = card.querySelector('.timer-time');
    const pauseBtn = card.querySelector('.pause-btn');
    const removeBtn = card.querySelector('.remove-btn');

    function tick() {
      remaining--;
      activeTimers[id] = remaining;
      timeEl.textContent = formatTime(remaining);
      if (remaining <= 0) {
        clearInterval(interval);
        delete activeTimers[id];
        timeEl.innerHTML = `<span class="done-label">DONE!</span>`;
        pauseBtn.style.display = 'none';
        // Play sound
        if (theme === 'mario') playMarioSound();
        else playRoombaSound();
        // Flash then remove
        card.classList.add('flashing');
        setTimeout(() => {
          card.style.transition = 'opacity 0.4s, transform 0.4s';
          card.style.opacity = '0';
          card.style.transform = 'scale(0.5)';
          setTimeout(() => card.remove(), 400);
        }, 1800);
      }
    }

    function startInterval() {
      interval = setInterval(tick, 1000);
    }

    startInterval();

    pauseBtn.addEventListener('click', () => {
      if (running) {
        clearInterval(interval);
        pauseBtn.textContent = '▶ Resume';
        running = false;
      } else {
        startInterval();
        pauseBtn.textContent = '⏸ Pause';
        running = true;
      }
    });

    removeBtn.addEventListener('click', () => {
      clearInterval(interval);
      delete activeTimers[id];
      card.style.transition = 'opacity 0.2s, transform 0.2s';
      card.style.opacity = '0';
      card.style.transform = 'scale(0.5)';
      setTimeout(() => card.remove(), 200);
    });

    sortTimers();
  }

  // Wheel Picker
  function buildWheel(containerId, innerId, count, pad) {
    const inner = document.getElementById(innerId);
    const container = document.getElementById(containerId);

    // Add selector highlight
    const sel = document.createElement('div');
    sel.className = 'wheel-selector';
    container.appendChild(sel);

    const items = [];
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'wheel-item';
      el.textContent = pad ? String(i).padStart(2, '0') : String(i);
      inner.appendChild(el);
      items.push(el);
    }

    const itemH = 44;
    const visibleCenter = 2; // 0-indexed center item in 5-visible window (160px / 44px ≈ 3.6, center = index 1)
    let currentIndex = 0;

    function scrollTo(idx, animate = true) {
      idx = Math.max(0, Math.min(count - 1, idx));
      currentIndex = idx;
      const offset = (container.clientHeight / 2) - (itemH / 2) - idx * itemH;
      if (!animate) inner.style.transition = 'none';
      inner.style.transform = `translateY(${offset}px)`;
      if (!animate) requestAnimationFrame(() => { inner.style.transition = ''; });
      items.forEach((el, i) => el.classList.toggle('active', i === idx));
    }

    // Init
    requestAnimationFrame(() => scrollTo(0, false));

    // Touch / mouse drag
    let startY = 0, startIdx = 0, isDragging = false;

    function onStart(y) {
      isDragging = true;
      startY = y;
      startIdx = currentIndex;
      inner.style.transition = 'none';
    }
    function onMove(y) {
      if (!isDragging) return;
      const delta = Math.round((startY - y) / itemH);
      scrollTo(startIdx + delta, false);
    }
    function onEnd() { isDragging = false; inner.style.transition = ''; }

    container.addEventListener('mousedown', e => onStart(e.clientY));
    window.addEventListener('mousemove', e => { if (isDragging) onMove(e.clientY); });
    window.addEventListener('mouseup', onEnd);

    container.addEventListener('touchstart', e => onStart(e.touches[0].clientY), { passive: true });
    container.addEventListener('touchmove', e => { onMove(e.touches[0].clientY); }, { passive: true });
    container.addEventListener('touchend', onEnd);

    container.addEventListener('wheel', e => {
      e.preventDefault();
      scrollTo(currentIndex + (e.deltaY > 0 ? 1 : -1));
    }, { passive: false });

    return { getValue: () => currentIndex, scrollTo };
  }

  const minuteWheel = buildWheel('wheel-minutes', 'wheel-minutes-inner', 60, true);
  const secondWheel = buildWheel('wheel-seconds', 'wheel-seconds-inner', 60, true);

  // Inject EMO SVG into static elements
  document.getElementById('page-title').innerHTML += roombaSVG(36, 45);
  document.getElementById('roomba-theme-btn').innerHTML = roombaSVG(24, 30) + ' Roomba';

  // Modal logic
  let selectedTheme = null;

  const overlay = document.getElementById('modal-overlay');
  const startBtn = document.getElementById('modal-start');

  document.getElementById('add-btn').addEventListener('click', () => {
    selectedTheme = null;
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('selected'));
    startBtn.disabled = true;
    overlay.classList.add('open');
    if (audioCtx.state === 'suspended') audioCtx.resume();
  });

  document.getElementById('modal-cancel').addEventListener('click', () => {
    overlay.classList.remove('open');
  });

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('open');
  });

  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTheme = btn.dataset.theme;
      checkReady();
    });
  });

  function checkReady() {
    const mins = minuteWheel.getValue();
    const secs = secondWheel.getValue();
    startBtn.disabled = !(selectedTheme && (mins > 0 || secs > 0));
  }

  // Re-check readiness when wheels are used
  ['wheel-minutes', 'wheel-seconds'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('mouseup', checkReady);
    el.addEventListener('touchend', checkReady);
    el.addEventListener('wheel', () => setTimeout(checkReady, 100));
  });

  startBtn.addEventListener('click', () => {
    const mins = minuteWheel.getValue();
    const secs = secondWheel.getValue();
    const total = mins * 60 + secs;
    if (total <= 0) return;
    overlay.classList.remove('open');
    showMathChallenge(selectedTheme, total);
  });

  // ── Math Challenge ────────────────────────────────────────────
  function generateQuestion() {
    const op = Math.random() < 0.5 ? '+' : '-';
    let a, b;
    if (op === '+') {
      a = Math.floor(Math.random() * 9) + 1; // 1–9
      b = Math.floor(Math.random() * 9) + 1; // 1–9
    } else {
      a = Math.floor(Math.random() * 9) + 1; // 1–9
      b = Math.floor(Math.random() * a) + 1; // 1–a (no negatives)
    }
    return { a, b, op, answer: op === '+' ? a + b : a - b };
  }

  function playCorrectSound() {
    // Power-up sound: rising square wave arpeggio
    // B4 B5 F#5 D#5 G#5 (classic Mario power-up feel)
    const notes = [494, 988, 740, 622, 831];
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'square';
      osc.frequency.value = freq;
      const t = audioCtx.currentTime + i * 0.08;
      gain.gain.setValueAtTime(0.22, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.start(t); osc.stop(t + 0.12);
    });
  }

  function playWrongSound() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sawtooth';
    osc.frequency.value = 180;
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  }

  let mathAnswer = null;
  let mathInput = '';
  let mathTheme = null;
  let mathSeconds = 0;

  function showMathChallenge(theme, seconds) {
    const q = generateQuestion();
    mathAnswer = q.answer;
    mathInput = '';
    mathTheme = theme;
    mathSeconds = seconds;

    const emoji = theme === 'mario' ? '⭐' : '🤖';
    document.getElementById('math-emoji').textContent = emoji;
    document.getElementById('math-question').textContent = `${q.a} ${q.op} ${q.b} = ?`;
    document.getElementById('math-feedback').textContent = 'What\'s the answer?';
    document.getElementById('math-overlay').classList.add('open');
  }

  function submitMathAnswer() {
    const val = parseInt(mathInput);
    if (isNaN(val)) {
      document.getElementById('math-feedback').textContent = 'Type a number first!';
      return;
    }
    if (val === mathAnswer) {
      document.getElementById('math-feedback').textContent = '🎉 Correct! Starting timer...';
      document.getElementById('math-modal').classList.add('correct-pop');
      playCorrectSound();
      setTimeout(() => {
        document.getElementById('math-modal').classList.remove('correct-pop');
        document.getElementById('math-overlay').classList.remove('open');
        createTimer(mathTheme, mathSeconds);
      }, 700);
    } else {
      document.getElementById('math-feedback').textContent = `Hmm, try again! 💪`;
      document.getElementById('math-modal').classList.add('shake');
      document.getElementById('math-question').textContent =
        document.getElementById('math-question').textContent.replace(/\?.*/, '?');
      playWrongSound();
      mathInput = '';
      setTimeout(() => document.getElementById('math-modal').classList.remove('shake'), 400);
    }
  }

  document.querySelectorAll('.num-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.val;
      if (val === 'del') {
        mathInput = mathInput.slice(0, -1);
      } else if (val === 'go') {
        submitMathAnswer();
        return;
      } else {
        if (mathInput.length >= 2) return; // max 2 digits
        mathInput += val;
      }
      const qEl = document.getElementById('math-question');
      const baseQ = qEl.textContent.split('=')[0].trim();
      qEl.textContent = `${baseQ} = ${mathInput || '?'}`;
    });
  });
</script>
